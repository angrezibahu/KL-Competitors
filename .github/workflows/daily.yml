name: Daily competitor capture

on:
  schedule:
    # Primary morning run, targeting 7am GMT. Deliberately NOT on the top of the
    # hour: GitHub's shared scheduler is busiest at round times like "0 7", which
    # is exactly when scheduled runs get delayed by hours or dropped entirely.
    # 07:11 UTC = 07:11 UK winter (GMT) / ~08:11 UK summer (BST). GitHub cron is
    # fixed UTC and does not follow DST, so this is 7am on the clock in winter and
    # 8am in summer; "7am GMT" means the GMT/UTC instant, not UK wall-clock.
    - cron: "11 7 * * *"
    # Self-healing backup a few hours later. The capture step below is a no-op
    # when the morning run already succeeded (see "Decide whether to run"), so
    # this only actually captures on days the 07:11 slot was dropped/delayed.
    - cron: "41 11 * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab anytime
  push:
    # Running once when this file changes on main both REGISTERS the workflow
    # (so it appears in the Actions sidebar / becomes dispatchable) and gives an
    # immediate real capture. It only fires when the workflow file itself
    # changes, so it won't run on every push.
    branches: [main]
    paths:
      - ".github/workflows/daily.yml"
      - "requirements.txt"
      - "scraper/**"

permissions:
  contents: write          # needed to commit the new data + screenshots back

concurrency:
  group: daily-capture
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Decide whether to run
        id: guard
        # Manual dispatch and workflow-file pushes always run. Scheduled runs
        # run only if today has no successful capture yet -- so the 11:41 backup
        # cron stays a no-op when the 08:11 run worked, but still fills the gap
        # (re-capturing the whole day) when GitHub dropped or delayed the
        # morning slot. We never clobber a good morning capture with a worse
        # afternoon one.
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Trigger '${{ github.event_name }}': running."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import datetime, json, sys
          today = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%d")
          try:
              data = json.load(open("docs/data/captures.json"))
          except Exception:
              data = []
          done = any(r.get("date") == today and r.get("status") == "success" for r in data)
          print("Scheduled run; today already captured =", done, file=sys.stderr)
          print("should_run=" + ("false" if done else "true"))
          PY

      - name: Install dependencies
        if: steps.guard.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run capture
        if: steps.guard.outputs.should_run == 'true'
        run: python -m scraper.capture
        # Don't fail the whole job just because one or two sites blocked us;
        # the per-brand status is recorded either way.
        continue-on-error: true

      - name: Rebuild events timeline + opportunities
        # Pure derivation of the (now-updated) capture history; safe + idempotent.
        run: python -m scraper.events
        continue-on-error: true

      - name: Commit today's data
        run: |
          git config user.name "katie-loxton-competitor-bot"
          git config user.email "actions@github.com"
          git add docs/data docs/screenshots
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "data: competitor capture $(date -u +%Y-%m-%d)"
          # A push can be rejected as non-fast-forward when another run or
          # workflow (a queued capture, the Pages deploy, a human merge) pushed
          # to main while we were capturing. The concurrency group above
          # serialises capture runs, but not those other writers -- so a benign
          # race must not lose a real capture. Rebase our data commit onto the
          # latest main and retry, only failing if it still can't land.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt); rebasing onto latest main..."
            git pull --rebase --autostash origin main || true
            sleep $((attempt * 3))
          done
          echo "::error::Could not push capture after 5 attempts."
          exit 1
